<!DOCTYPE html>
<html>

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta charset="utf-8" />
  <link rel="stylesheet" href="/asset/css/globals.css" />
  <link rel="stylesheet" href="/asset/css/styleguide.css" />
  <link rel="stylesheet" href="/asset/css/style.css" />
  <title>CheckMyClass - 로그인</title>
</head>

<body>
  <div class="log-in">
    <div class="view">
      <div class="check-my-class">
        <img class="check-my-class" src="/asset/Logo/Logo_main_CheckMyClass.png" alt="Logo_main" />
      </div>
    </div>

    <div class="login">
      <form id="loginForm">
        <div class="info">
          <div class="text-wrapper">아이디</div>
          <input class="input" type="text" name="user_id" required>
          <div class="frame"></div>

          <div class="div">비밀번호</div>
          <input class="input" type="password" name="user_password" required>
          <div class="frame"></div>
        </div>

        <div class="actions">
          <button class="button-wrapper" type="submit">
            <div class="button-2">로그인</div>
          </button>

          <nav class="text-link" role="navigation" aria-label="사용자 계정 관리">
            <a href="register.html" class="text-wrapper">회원가입</a>
            <a href="#password-recovery" class="text-wrapper">비밀번호 찾기</a>
          </nav>
        </div>
      </form>
    </div>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async function (e) {
      e.preventDefault();

      const formData = new FormData(this);
      const jsonData = Object.fromEntries(formData.entries());

      try {
        // 아직 api/login.php는 없지만, 패턴은 동일합니다.
        const response = await fetch('/api/login.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(jsonData)
        });

        const result = await response.json();

        if (response.ok && result.success) {
          // 로그인 성공 시 로컬 스토리지에 사용자 정보 저장 (예시)
          localStorage.setItem('user_name', result.user_name || '사용자');
          localStorage.setItem('user_id', result.user_id);

          window.location.href = 'main.html';
        } else {
          alert('로그인 실패: ' + (result.message || '아이디 또는 비밀번호를 확인하세요.'));
        }
      } catch (error) {
        console.error('Error:', error);
        alert('서버 통신 중 오류가 발생했습니다. (API 미구현 상태일 수 있음)');
      }
    });
  </script>
</body>

</html>
